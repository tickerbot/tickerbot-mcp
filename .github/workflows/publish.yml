name: Publish to npm

# Tag-based publish via npm Trusted Publishing (OIDC).
#
# Release flow:
#   npm version patch          # bumps package.json + creates a v0.x.y tag
#   git push --follow-tags     # pushes the commit and the tag
#
# Auth: OIDC. The `id-token: write` permission lets GitHub mint a short-
# lived token that npm validates against the trusted publisher config on
# @tickerbot/mcp-server. No long-lived NPM_TOKEN secret needed.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to attach the .mcpb bundle to the GitHub Release
  id-token: write   # required for npm package provenance attestations

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      # npm 11.5+ is required for OIDC Trusted Publishing. Node 20 LTS
      # still ships with npm 10.x by default, so we upgrade explicitly.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "Publishing version $PKG_VERSION"

      - name: Smoke test (stdio handshake + tools/list)
        run: |
          # Verify the protocol handshake works and tools/list returns a
          # non-empty catalog. We force the baked-snapshot path by pointing
          # TICKERBOT_API_URL at an unreachable host — otherwise the count
          # depends on what main_service is currently serving (runtime
          # discovery) and the test becomes brittle.
          OUT=$( (
            printf '%s\n' \
              '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
              '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' \
              '{"jsonrpc":"2.0","id":2,"method":"tools/list"}'
            sleep 4
          ) | TICKERBOT_API_KEY=ci-smoke-key TICKERBOT_API_URL=http://127.0.0.1:1 node ./bin/tickerbot-mcp.js 2>/dev/null )
          COUNT=$(echo "$OUT" | tail -1 | node -e "const j=JSON.parse(require('fs').readFileSync(0,'utf8')); console.log((j.result && j.result.tools) ? j.result.tools.length : 0)")
          echo "Tool count: $COUNT"
          if [ "$COUNT" -lt "1" ]; then
            echo "::error::Smoke test failed — tools/list returned 0 or no response"
            exit 1
          fi

      - name: Publish via Trusted Publishing (OIDC)
        # No NODE_AUTH_TOKEN — npm 11.5+ detects the GitHub OIDC token
        # (from the `id-token: write` permission above) and validates it
        # against the trusted publisher config on npm. `--provenance`
        # attaches a signed attestation visible on the package page.
        run: npm publish --provenance --access public

      - name: Build MCPB bundle
        # Self-contained .mcpb file for Claude Desktop click-to-install.
        # Output: dist-mcpb/tickerbot.mcpb (~115 KB).
        run: npm run build:mcpb

      - name: Create GitHub Release with .mcpb attached
        # The Tier 2 install path on /mcp-server links to the
        # `releases/latest/download/tickerbot.mcpb` URL — this step
        # publishes that artifact for every tag, so the download link
        # always resolves to the freshest build.
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: dist-mcpb/tickerbot.mcpb
